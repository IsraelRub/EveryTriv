events {
	worker_connections 1024;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;

	sendfile        on;
	keepalive_timeout  65;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}

	# Enable gzip compression
	gzip on;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	server {
		listen 3000;
		server_name localhost;

		root /usr/share/nginx/html;
		index index.html;

		# Nest health is @Controller('/api/health') — pass URI unchanged (not stripped like other /api/* routes)
		location /api/health {
			proxy_pass http://server:3002;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_read_timeout 120s;
		}

		# REST: axios base is /api + shared paths without leading /api (e.g. /users) -> upstream /users
		location /api/ {
			proxy_pass http://server:3002/;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_read_timeout 120s;
		}

		# SPA handoff after OAuth (Nest redirects here with tokens in query; must not hit API)
		location = /auth/callback {
			try_files $uri /index.html;
		}

		# OAuth browser navigations (same origin as SPA) — /auth/google, /auth/google/callback, etc.
		location /auth/ {
			proxy_pass http://server:3002/auth/;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_read_timeout 120s;
		}

		# Socket.IO engine (namespace /multiplayer still uses /socket.io on the server)
		location /socket.io {
			proxy_pass http://server:3002;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_read_timeout 86400s;
			proxy_send_timeout 86400s;
		}

		# Optional direct hits to /multiplayer (REST is normally under /api/multiplayer)
		location /multiplayer {
			proxy_pass http://server:3002;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_read_timeout 86400s;
			proxy_send_timeout 86400s;
		}

		# Handle client-side routing
		location / {
			try_files $uri $uri/ /index.html;
		}

		# Cache static assets
		location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
			expires 1y;
			add_header Cache-Control "public, immutable";
		}

		# Security headers
		add_header X-Frame-Options "SAMEORIGIN" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-XSS-Protection "1; mode=block" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;

		# Health check endpoint
		location /health {
			access_log off;
			return 200 "healthy\n";
			add_header Content-Type text/plain;
		}
	}
}
