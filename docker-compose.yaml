services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: everytriv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: everytriv
      POSTGRES_USER: everytriv_user
      # Same value as server DATABASE_PASSWORD (project .env when present).
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-test123}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U everytriv_user -d everytriv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - everytriv-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: everytriv-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-R3d!s_Pr0d_P@ssw0rd_2025_S3cur3!}
      # So redis-cli in healthcheck authenticates (matches requirepass).
      REDISCLI_AUTH: ${REDIS_PASSWORD:-R3d!s_Pr0d_P@ssw0rd_2025_S3cur3!}
    command: ['sh', '-c', 'exec redis-server --requirepass "$$REDIS_PASSWORD"']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - everytriv-network

  # Backend Server
  server:
    build: 
      context: .
      dockerfile: server/Dockerfile
    container_name: everytriv-server
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    # Runtime config: root `.env` only (avoids contradicting overrides vs env_file).
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/logs:/app/logs
    networks:
      - everytriv-network
    # HEALTHCHECK: defined in server/Dockerfile (single definition)

  # Frontend Client
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # Baked at build from root `.env`. Tunnel/public demo: USE_ORIGIN_API_PREFIX — nginx proxies /api, /auth, /multiplayer to server.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-USE_ORIGIN_API_PREFIX}
    container_name: everytriv-client
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - server
    networks:
      - everytriv-network

  # Cloudflare Quick Tunnel → public https URL to the client container (same Docker network as nginx :3000).
  # Start with: docker compose --profile demo-tunnel up --build -d   (or pnpm run start:demo:up; full demo+sync: pnpm run start:demo)
  # Read the printed URL: docker compose logs cloudflared | findstr https
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: everytriv-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://client:3000
    depends_on:
      - client
    networks:
      - everytriv-network
    profiles:
      - demo-tunnel

  # pgAdmin - Web-based PostgreSQL administration (Development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: everytriv-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@everytriv.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - everytriv-network
    profiles:
      - dev

  # Redis Commander - Web-based Redis administration (Development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: everytriv-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-R3d!s_Pr0d_P@ssw0rd_2025_S3cur3!}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - everytriv-network
    profiles:
      - dev

  # WebDB — DB UI (development); start with: docker compose --profile dev up
  webdb:
    image: webdb/app:latest
    container_name: everytriv-webdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:22071:22071"
    volumes:
      - webdb_data:/usr/src/app/static/version
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - everytriv-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  webdb_data:

networks:
  everytriv-network:
    # Explicit Docker name avoids default "{project}_everytriv-network" (duplicate "everytriv").
    name: everytriv-net
    driver: bridge
